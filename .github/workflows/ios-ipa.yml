name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-ipa:
    runs-on: macos-latest
    env:
      PROJECT_PATH: IosPythonRunner.xcodeproj
      SCHEME: IosPythonRunner
      CONFIGURATION: Release
      EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify signing secrets present
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${IOS_P12_BASE64:-}" || -z "${IOS_P12_PASSWORD:-}" || -z "${IOS_MOBILEPROVISION_BASE64:-}" || -z "${IOS_KEYCHAIN_PASSWORD:-}" ]]; then
            echo "Missing signing secrets."
            echo "Add these GitHub Secrets to build an installable .ipa:"
            echo "  IOS_P12_BASE64 (base64 of .p12 signing cert)"
            echo "  IOS_P12_PASSWORD"
            echo "  IOS_MOBILEPROVISION_BASE64 (base64 of .mobileprovision)"
            echo "  IOS_KEYCHAIN_PASSWORD"
            exit 1
          fi
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}

      - name: Install signing certificate and profile
        shell: bash
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/ios_signing_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/ios_signing.keychain-db"

          echo "$IOS_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_MOBILEPROVISION_BASE64" | base64 --decode > "$PROFILE_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$PROFILE_PLIST")

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}

      - name: Resolve bundle identifier
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_ID="$(grep -m1 'PRODUCT_BUNDLE_IDENTIFIER' "$PROJECT_PATH/project.pbxproj" | sed -E 's/.*PRODUCT_BUNDLE_IDENTIFIER = ([^;]+);/\\1/' | tr -d '[:space:]')"
          echo "BUNDLE_ID=$BUNDLE_ID" >> "$GITHUB_ENV"
          echo "Bundle ID: $BUNDLE_ID"

      - name: Create ExportOptions.plist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build

          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/ios_signing.keychain-db"

          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/IosPythonRunner.xcarchive" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/ios_signing.keychain-db"

          xcodebuild -exportArchive \
            -archivePath "$PWD/build/IosPythonRunner.xcarchive" \
            -exportOptionsPlist "$PWD/build/ExportOptions.plist" \
            -exportPath "$PWD/build/export" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: IosPythonRunner-ipa
          path: build/export/*.ipa
